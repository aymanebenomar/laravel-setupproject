      <div class="card">
        <span class="concept-badge">What is a migration?</span>

        <pre><span class="cm">// database/migrations/..._create_posts_table.php</span>
<span class="kw">public function</span> <span class="fn">up</span>(): <span class="kw">void</span>
{
    Schema::<span class="fn">create</span>(<span class="str">'posts'</span>, <span class="kw">function</span> (Blueprint $table) {
        $table-><span class="fn">id</span>();                    <span class="cm">// bigint unsigned auto-increment</span>

}

<span class="kw">public function</span> <span class="fn">down</span>(): <span class="kw">void</span>

      <div class="card">
        <span class="concept-badge">What is Eloquent?</span>
        <p>Eloquent is Laravel's ORM (Object-Relational Mapper). Each database table has a corresponding "Model" class. You read/write the database using PHP methods instead of writing SQL.</p>
        <div class="tip">Model = 1 PHP class ↔ 1 database table</div>

      <div class="card">

        <div class="cmd-block"><span class="cmd-prefix">$</span><span class="cmd-text">php artisan make:model Post -m</span><span style="font-size:11px;color:var(--color-text-tertiary);margin-left:8px">-m = also create migration</span></div>
        <pre><span class="cm">// app/Models/Post.php</span>
<span class="kw">class</span> Post <span class="kw">extends</span> Model

    <span class="cm">// Columns that can be mass-assigned</span>

    <span class="cm">// Or use $guarded = [] to allow all</span>
    
    <span class="cm">// Automatically cast these types</span>

        <span class="str">'published_at'</span> => <span class="str">'datetime'</span>,

<span class="cm">// READ — collection</span>

<span class="cm">// UPDATE</span>

$post->title = <span class="str">'New title'</span>;
$post-><span class="fn">save</span>();

<span class="cm">// DELETE</span>
$post-><span class="fn">delete</span>();
Post::<span class="fn">destroy</span>(<span class="nu">1</span>);
Post::<span class="fn">destroy</span>([<span class="nu">1</span>, <span class="nu">2</span>, <span class="nu">3</span>]);</pre>

<span class="kw">public function</span> <span class="fn">user</span>()

<span class="kw">public function</span> <span class="fn">tags</span>()

let current = 0;
const done = new Set();

function init() {
  const progressBar = document.getElementById('progress-bar');
  const navPills = document.getElementById('nav-pills');
  const sections = document.getElementById('sections');
  
  topics.forEach((t, i) => {
    const dot = document.createElement('div');
    dot.className = 'prog-dot';
    dot.id = 'dot-' + i;
    dot.onclick = () => goTo(i);
    progressBar.appendChild(dot);
    
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.id = 'pill-' + i;
    pill.textContent = t.label;
    pill.onclick = () => goTo(i);
    navPills.appendChild(pill);
    
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'section-' + i;
    sec.innerHTML = `
      <div style="margin-bottom:1rem">
        <div class="sec-title">${t.label}</div>
        <div class="sec-sub">${t.subtitle}</div>
      </div>
      ${t.content}
    `;
    sections.appendChild(sec);
  });
  
  goTo(0);
}

function goTo(i) {
  document.getElementById('section-' + current)?.classList.remove('active');
  document.getElementById('pill-' + current)?.classList.remove('active');
  
  current = i;
  done.add(i);
  
  document.getElementById('section-' + i).classList.add('active');
  document.getElementById('pill-' + i).classList.add('active');
  
  topics.forEach((_, j) => {
    const dot = document.getElementById('dot-' + j);
    dot.className = 'prog-dot' + (j === i ? ' active' : (done.has(j) ? ' done' : ''));
  });
  
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-prev').style.opacity = i === 0 ? '0.4' : '1';
  document.getElementById('btn-next').textContent = i === topics.length - 1 ? 'Done ✓' : 'Next →';
  
  window.scrollTo(0, 0);
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) goTo(next);
}

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy', 1500);
  });
}

function toggleCheck(li) {
  const chk = li.querySelector('.chk');
  chk.classList.toggle('checked');
}

init();
